<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SSE 测试工具</title>
</head>
<body>
    <h1>SSE 测试工具</h1>
    <button onclick="testSSE()">测试 SSE 流</button>
    <div id="output" style="background: #f0f0f0; padding: 10px; margin-top: 10px; white-space: pre-wrap; word-break: break-all;"></div>

    <script>
        async function testSSE() {
            const output = document.getElementById('output');
            output.textContent = '开始测试...\n\n';

            try {
                const response = await fetch('/api/process-image-stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filenames: ['wiki-1772694917387-15.png'],
                        debug: true,
                        params: {}
                    })
                });

                output.textContent += `响应状态: ${response.status}\n`;
                output.textContent += `Content-Type: ${response.headers.get('content-type')}\n\n`;

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        output.textContent += '\n流读取完成';
                        break;
                    }

                    const chunk = decoder.decode(value, { stream: true });
                    output.textContent += `接收到 chunk (${chunk.length} 字节):\n${chunk}\n\n`;
                }
            } catch (error) {
                output.textContent += `错误: ${error.message}\n`;
                console.error(error);
            }
        }
    </script>
</body>
</html>
